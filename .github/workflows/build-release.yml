name: Android CI/CD Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      BUILD_TOOLS_VERSION: '34.0.0'
      ANDROID_HOME: '/usr/local/lib/android/sdk'
      ANDROID_SDK_ROOT: '/usr/local/lib/android/sdk'
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # Check if signing secrets are available (secrets cannot be used directly in `if:` expressions)
    - name: Check signing secrets
      id: check_signing
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      run: |
        if [ -n "$SIGNING_KEY" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi

    - name: Sign APK
      id: sign_apk
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release Tag
      id: create_tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: echo "tag_name=release-$(date +'%Y%m%d%H%M%S')-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

    # Upload signed APK if signing secrets are available, otherwise upload unsigned APK
    - name: Create GitHub Release and Upload Signed APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag_name }}
        name: Release ${{ steps.create_tag.outputs.tag_name }}
        body: |
          Automated release for commit ${{ github.sha }}.
        files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
        draft: false
        prerelease: false

    - name: Create GitHub Release and Upload Unsigned APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag_name }}
        name: Release ${{ steps.create_tag.outputs.tag_name }}
        body: |
          Automated release for commit ${{ github.sha }}.
          Note: This APK is unsigned. Configure signing secrets for a signed release.
        files: app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
