name: Android CI/CD Build and Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: '/usr/local/lib/android/sdk'
      ANDROID_SDK_ROOT: '/usr/local/lib/android/sdk'
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # Check if signing secrets are available (secrets cannot be used directly in `if:` expressions)
    - name: Check signing secrets
      id: check_signing
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      run: |
        if [ -n "$SIGNING_KEY" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi

    - name: List APK build output
      run: ls -lh app/build/outputs/apk/release/ || echo "APK output directory not found"

    - name: Sign APK (production keystore)
      id: sign_apk
      if: steps.check_signing.outputs.available == 'true'
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Sign APK with debug key (no signing secrets)
      id: sign_debug
      if: steps.check_signing.outputs.available == 'false'
      run: |
        APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found in build output"
          exit 1
        fi
        echo "Found APK: $APK ($(du -h "$APK" | cut -f1))"

        # Generate debug keystore
        keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug, O=Android, C=US" \
          -storepass android -keypass android -noprompt

        # Find apksigner tool - try multiple possible locations
        APKSIGNER=""
        if [ -n "$ANDROID_HOME" ]; then
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1 2>/dev/null || echo "")
          if [ -n "$BUILD_TOOLS" ]; then
            APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          fi
        fi
        
        # Fallback to system apksigner if available
        if [ ! -f "$APKSIGNER" ]; then
          APKSIGNER=$(which apksigner 2>/dev/null || echo "")
        fi
        
        if [ ! -f "$APKSIGNER" ] && [ ! -x "$APKSIGNER" ]; then
          echo "ERROR: apksigner not found. Trying jarsigner as fallback..."
          # Use jarsigner as last resort
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore debug.keystore -storepass android \
            "$APK" androiddebugkey
          mkdir -p release
          cp "$APK" "release/ssh-socks-apk-${{ github.ref_name }}.apk"
        else
          echo "Using apksigner: $APKSIGNER"
          mkdir -p release
          "$APKSIGNER" sign \
            --ks debug.keystore --ks-key-alias androiddebugkey \
            --ks-pass pass:android --key-pass pass:android \
            --out "release/ssh-socks-apk-${{ github.ref_name }}.apk" \
            "$APK"
        fi
        
        echo "Signed APK size: $(du -h "release/ssh-socks-apk-${{ github.ref_name }}.apk" | cut -f1)"

    - name: Rename production-signed APK for release
      if: steps.check_signing.outputs.available == 'true'
      run: |
        mkdir -p release
        cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" "release/ssh-socks-apk-${{ github.ref_name }}.apk"

    - name: Verify APK exists for upload
      run: |
        APK_FILE="release/ssh-socks-apk-${{ github.ref_name }}.apk"
        if [ ! -f "$APK_FILE" ]; then
          echo "ERROR: APK file not found at $APK_FILE"
          echo "Contents of release directory:"
          ls -la release/ 2>/dev/null || echo "Release directory does not exist"
          exit 1
        fi
        echo "✓ APK ready for upload: $APK_FILE ($(du -h "$APK_FILE" | cut -f1))"

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          Automated release for commit ${{ github.sha }}.
        files: release/ssh-socks-apk-${{ github.ref_name }}.apk
        draft: false
        prerelease: false
