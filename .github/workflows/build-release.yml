name: Android CI/CD Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      BUILD_TOOLS_VERSION: '34.0.0'
      ANDROID_HOME: '/usr/local/lib/android/sdk'
      ANDROID_SDK_ROOT: '/usr/local/lib/android/sdk'
      HAS_SIGNING_SECRET: ${{ secrets.SIGNING_KEY_STORE_BASE64 != '' }}
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Debug Android SDK
      run: |
        ls -d /usr/local/lib/android/sdk/build-tools/* || echo "No build-tools found"

    - name: Diagnostic - List Android Build Tools
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        if [ -d "$ANDROID_HOME/build-tools" ]; then
          ls -1 "$ANDROID_HOME/build-tools"
        elif [ -d "$ANDROID_SDK_ROOT/build-tools" ]; then
          ls -1 "$ANDROID_SDK_ROOT/build-tools"
        else
          echo "Build tools directory not found in common locations."
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # Check if signing secrets are available (secrets cannot be used directly in `if:` expressions)
    - name: Check signing secrets
      id: check_signing
      env:
        SIGNING_KEY: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
      run: |
        if [ -n "$SIGNING_KEY" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
        fi
    - name: List build directory
      run: ls -R app/build/outputs/apk/release/

    - name: Sign APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SIGNING_KEY_STORE_BASE64 != ''
      id: sign_apk
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        alias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release Tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SIGNING_KEY_STORE_BASE64 != ''
      id: create_tag
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      # This creates a unique tag based on the date and commit hash
      run: echo "tag_name=release-$(date +'%Y%m%d%H%M%S')-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

    # NOTE: If the 'Create GitHub Release' or 'Upload Release Asset' steps fail with
    # "Error: Resource not accessible by integration", it usually means the default
    # GITHUB_TOKEN does not have sufficient permissions.
    # To resolve this:
    # 1. Check repository settings: Go to Settings > Actions > General > Workflow permissions.
    #    Ensure "Read and write permissions" is selected for GITHUB_TOKEN.
    # 2. If the issue persists, or for more fine-grained control, create a Personal Access Token (PAT)
    #    with 'repo' (or 'public_repo' for public repos) and 'workflow' scopes.
    #    Store this PAT as a secret in the repository (e.g., `RELEASE_PAT`) and
    #    use it in the `env` block for these steps:
    #    env:
    #      GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
    #    Remember that using a PAT grants permissions based on the user who created it.
    - name: Create GitHub Release
      id: create_release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
      run: echo "tag_name=release-$(date +'%Y%m%d%H%M%S')-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and Upload Asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.sign_apk.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag_name }}
        name: Release ${{ steps.create_tag.outputs.tag_name }}
        body: |
          Automated release for commit ${{ github.sha }}.
        files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
        draft: false
        prerelease: false

    - name: Upload Release Asset (Signed APK)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check_signing.outputs.available == 'true'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
